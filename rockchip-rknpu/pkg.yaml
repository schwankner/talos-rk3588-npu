name: rockchip-rknpu
variant: scratch
shell: /bin/bash
# {{ if eq .ARCH "aarch64" }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
dependencies:
  - stage: base
  # kernel-build provides /src with the full kernel source tree and Module.symvers.
  # The pkgs commit for a given Talos release is documented in:
  # https://github.com/siderolabs/talos/blob/<talos-version>/pkg/machinery/gendata/data/pkgs
  #
  # NOTE: Talos 1.13.x pkgs build the kernel with Clang/ThinLTO (toolchain-llvm).
  # LLVM=1 must be passed to make so the OOT module is compiled with clang
  # and uses the same LLVM IR ABI as the in-tree objects.  Without it, GCC
  # produces incompatible relocations and module signing fails.
  # The LLVM_IMAGE dependency (ghcr.io/siderolabs/llvm) provides clang/lld in
  # PATH so that LLVM=1 can find them.  Mirrors the kernel-prepare dependency.
  - image: "{{ .LLVM_IMAGE }}:{{ .TOOLS_REV }}"
  - stage: kernel-build
steps:
  - sources:
      # w568w/rknpu-module: out-of-tree Rockchip vendor rknpu driver, ported to mainline kernel.
      # Tested on kernel 6.19 (works on 6.18 as well — identical API surface).
      # Version 0.9.8 matches RKNN SDK / librknnrt.so 2.3.x ABI.
      - url: https://github.com/w568w/rknpu-module/archive/refs/heads/main.tar.gz
        destination: rknpu-module.tar.gz
        sha256: "4ad3a6fc8afdc53cacbebe4b7075e40c7c46a5fbb457a0efc28c6d4dc93d271f"
        sha512: "02a5a2642835227559d00f49a61f2bdbae1f75aa76bcb5731d0d19e3cf6b48e8902c7949635f219faf8693ce5ee228fb38d6d80e4ce0d8f4792a9ee15fa9b1bc"
    env:
      ARCH: arm64
    prepare:
      - |
        KERNEL_RELEASE=$(cat /src/include/config/kernel.release)
        mkdir -p /rootfs/usr/lib/modules/${KERNEL_RELEASE}/kernel/drivers/rknpu
        mkdir -p /rootfs/usr/lib/udev/rules.d
        tar xf rknpu-module.tar.gz --strip-components=1

        # Replace the upstream Kbuild with our patched version that drops
        # rknpu_devfreq.o.  The Talos 1.12.x kernel has CONFIG_PM_DEVFREQ=n
        # so linux/devfreq-governor.h is not installed; compiling devfreq.c
        # fails.  The rknpu_devfreq.h header already provides inline no-op
        # stubs for all devfreq functions when CONFIG_PM_DEVFREQ is unset.
        # We ship the patched Kbuild in files/ to ensure bldr cache is
        # invalidated deterministically (sed on a cached layer is invisible).
        cp /pkg/files/Kbuild ./Kbuild

        # Install the rk-dma-heap.h compat stub so the DMA_HEAP code path
        # compiles against a mainline kernel that lacks Rockchip BSP headers.
        # The existing -I$(src)/src/include/compat ccflag picks it up first.
        mkdir -p src/include/compat/linux
        cp /pkg/files/rk-dma-heap.h src/include/compat/linux/rk-dma-heap.h

        # Install the build-config force-include header.  This header is
        # picked up via -include $(src)/src/include/compat/rknpu_build_config.h
        # in Kbuild.  It #undefs CONFIG_ROCKCHIP_RKNPU_DRM_GEM at the source
        # level (after autoconf.h runs), ensuring misc_register() path is taken.
        cp /pkg/files/rknpu_build_config.h src/include/compat/rknpu_build_config.h

        # Diagnostic: report any RKNPU entries in the kernel's autoconf.h so
        # we know whether CONFIG_ROCKCHIP_RKNPU_DRM_GEM is being injected.
        echo "=== autoconf.h RKNPU entries ===" && \
          grep -i "RKNPU" /src/include/generated/autoconf.h || \
          echo "(no RKNPU entries in autoconf.h)" && \
          echo "=== end autoconf.h ==="

        # Install rknpu_mem.c — the w568w driver declares
        # rknpu_mem_{create,destroy,sync}_ioctl in rknpu_mem.h but provides no
        # definitions.  librknnrt.so v2.3.x calls RKNPU_MEM_CREATE to allocate
        # NPU memory for model weights and command buffers.
        #
        # Bug 55 rev 2: dma_alloc_noncontiguous() also returns NULL on kernel
        # 6.18.22 because iommu_dma_alloc_pages() fails to find a contiguous
        # 2.4 GB IOVA window within the device's IOVA domain.  Fix: allocate
        # pages individually with alloc_page(GFP_KERNEL), build an sg_table,
        # then call dma_map_sgtable() which maps each page individually without
        # needing a contiguous IOVA range.  vmap() provides the kernel VA.
        cp /pkg/files/rknpu_mem.c src/rknpu_mem.c

        # Bug 35: rknpu_gem_sync_ioctl references rknpu_dev->fake_dev in the
        # non-contiguous scatter-gather sync path.  fake_dev is a field that
        # only exists in struct rknpu_device under CONFIG_ROCKCHIP_RKNPU_DRM_GEM
        # (it is a synthetic platform device with the NPU DMA mask, created by
        # drm_fake_dev_register).  With DMA_HEAP-only build the field is absent
        # and compilation fails with "has no member named 'fake_dev'".
        # Fix: replace the three fake_dev references with rknpu_dev->dev.
        # The real NPU platform device has an identical DMA configuration
        # (of_dma_configure is called during probe), so dma_sync_single_range_*
        # behaves identically.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 36: rk_dma_heap_find("rk-dma-heap-cma") returns NULL on mainline
        # kernels — the Rockchip BSP CMA heap is not exported.  The probe then
        # goto err_remove_drv → misc_deregister(), leaving /dev/rknpu absent.
        # librknnrt.so v2.3.x uses /dev/dma_heap/system for memory allocation
        # and /dev/rknpu only for RKNPU_SUBMIT; the rknpu CMA heap is never
        # needed.  Fix: make the heap-not-found check a warning-only so
        # /dev/rknpu stays registered and rknpu_dev->heap is left NULL.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Add MODULE_DEVICE_TABLE so udev autoloads rknpu.ko when the kernel
        # reports a DT device with compatible = "rockchip,rk3588-rknpu".
        # Without this, modules.alias has no "of:" entry and udevd never
        # triggers modprobe -- leaving fdab0000.rknpu unprobed, which keeps
        # the NPU PM domain sync_state() pending and blocks Ethernet (Bug 16)
        # even in Talos maintenance mode (where machine.kernel.modules is not
        # applied).
        python3 -c "import sys; d=open('src/rknpu_drv.c').read(); d=d.replace('\t{},\n};\n\nstatic int rknpu_get_drv_version', '\t{},\n};\nMODULE_DEVICE_TABLE(of, rknpu_of_match);\n\nstatic int rknpu_get_drv_version', 1); open('src/rknpu_drv.c','w').write(d); sys.exit(0 if 'MODULE_DEVICE_TABLE(of, rknpu_of_match)' in d else 1)"

        # Bug 26 / Bug 41: keep NPU genpd sub-domain devices active after probe.
        #
        # Bug 26: IS_ERR() misses NULL return from dev_pm_domain_attach_by_name()
        # when the power-domain node exists in DT but the driver has not yet
        # attached -- NULL means "not ready yet", not an error.  Fix: IS_ERR_OR_NULL().
        #
        # Bug 41: pm_runtime_get_noresume() only increments usage_count but
        # leaves runtime_status=RPM_SUSPENDED.  genpd_sync_power_off() checks
        # pm_runtime_suspended(dev) which returns true for RPM_SUSPENDED, so
        # it powers off the NPU sub-domains even though usage_count=1.  With
        # the domains off, MMIO reads to 0xfdab0000 (rknpu_get_hw_version) hang
        # the AXI bus -- hard reset, no kernel panic.
        #
        # Fix: use pm_runtime_get_sync(virt_dev) instead.  This calls
        # genpd_runtime_resume -> rockchip_pd_power() via PMU register writes
        # (not SCMI -- devfreq/OPP is disabled by Bug 28) and sets
        # runtime_status=RPM_ACTIVE.  genpd_sync_power_off sees an active
        # device and does not power off the domain.  NPU hardware stays on.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 44: mainline RK3588 DT uses "nputop" (not "npu0") for the first NPU power
        # domain.  dev_pm_domain_attach_by_name(dev, "npu0") returns NULL on mainline
        # kernels, leaving genpd_dev_npu0=NULL.  The nputop genpd domain then has no
        # consumer → genpd powers it off → MMIO reads to 0xfdab0000 hang the AXI bus.
        # Fix: when "npu0" attachment fails, fall back to "nputop".  This ensures the
        # NPU top-level power domain is always attached regardless of DT naming convention.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 43: pm_runtime_get_sync(virt_dev) alone in Bug 41 is not enough to keep the
        # genpd virtual devices RPM_ACTIVE after probe.  Genpd internal cleanup decrements
        # usage_count to 0, suspending the virtual devices and powering off the NPU sub-
        # domains (confirmed: sysfs shows genpd:1/2:fdab0000.rknpu as "suspended").
        # Fix: add pm_runtime_get_noresume(virt_dev) after each get_sync to permanently
        # anchor usage_count >= 1, mirroring Bug 33 which does the same for the main device.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 26 / Bug 32: power on the NPU's genpd domain during probe via
        # pm_runtime_get_sync(dev), keeping the device RPM_ACTIVE.
        #
        # Root cause (Bug 32): genpd_sync_power_off() fires after rknpu probes
        # (triggered by sync_state() for fdab0000.npu).  It powers off the NPU
        # power domain when it finds the device in RPM_SUSPENDED state.  With
        # the domain off, any write to NPU MMIO (e.g. PC_OP_EN in
        # rknpu_job_subcore_commit_pc) causes an AXI bus lockup → hard hang.
        #
        # pm_runtime_get_sync(dev) resumes the device through genpd:
        #   genpd_runtime_resume() → rockchip_pd_power_on() → PMU writes →
        #   NPU top power domain ON → dev->power.runtime_status = RPM_ACTIVE.
        #
        # Note: this is also called before multiple_domains genpd attachment,
        # so it resumes the device via its DT power-domain (<&power PD_NPU>),
        # which is enough for non-iommu mode (single fdab0000.rknpu device).
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 33: prevent probe's pm_runtime_put_autosuspend from undoing Bug 32.
        # After pm_runtime_get_sync (Bug 32) sets usage=1 and status=RPM_ACTIVE,
        # the original probe calls pm_runtime_put_autosuspend, which decrements
        # usage to 0 and schedules autosuspend.  When autosuspend fires (~2 s
        # after probe), rknpu_runtime_suspend → rknpu_power_off [Bug 31: no-op],
        # but the device transitions to RPM_SUSPENDED.  The genpd then powers
        # off the NPU domain (rockchip_pd_power_off → SCMI to ATF).  The next
        # DRM ioctl calls pm_runtime_get_sync(dev), triggering genpd_runtime_resume
        # → rockchip_pd_power_on → SCMI to ATF at runtime → system crash.
        #
        # Fix: add pm_runtime_get_noresume(dev) immediately after get_sync to
        # bump usage to 2.  The probe's put_autosuspend decrements to 1 (not 0),
        # so autosuspend is never scheduled and the device stays RPM_ACTIVE
        # permanently.  No genpd power transitions happen after probe.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Disable entire rknpu devfreq subsystem (Bug 28 + Bug 29).
        # rknpu_devfreq_init() registers the rknpu_ondemand devfreq governor which fires
        # every 50 ms and calls npu_devfreq_target() → dev_pm_opp_set_rate() →
        # clk_set_rate(scmi_clk) → SCMI SMC into ATF at EL3 → hard hang (Bug 28).
        # Additionally, devm_pm_opp_set_clkname() and devm_pm_opp_of_add_table() may
        # issue SCMI clock-get-rate messages during OPP table setup, and the devfreq
        # framework's resume path calls dev_pm_opp_set_rate() independently (Bug 29).
        # Nuclear fix: replace rknpu_devfreq_init() body with return 0 to skip ALL
        # devfreq/OPP initialization.  rknpu_dev->devfreq stays NULL, so
        # devfreq_lock/unlock in rknpu_power_on/off are safe no-ops.
        # NPU runs at boot-time frequency; SCMI-based DVFS is not viable on this ATF.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Keep NPU clocks always-on after probe to prevent SCMI crash at EL3 (Bug 27).
        # rknpu_power_off() calls clk_bulk_disable_unprepare() which issues a SCMI
        # clock-disable SMC into ATF, and the subsequent clk_bulk_prepare_enable() in
        # rknpu_power_on() (triggered by the next build_graph()/ioctl) issues a SCMI
        # clock-enable SMC — both paths crash ATF at EL3 on mainline RK3588.
        # Fix: call clk_bulk_prepare_enable() once extra in probe (after rknpu_power_on)
        # to keep the clock reference count >=1 permanently.  The disable in power_off
        # then decrements from 2 to 1 (clocks stay on), and the enable in power_on
        # increments from 1 to 2 again — steady state, no SCMI SMC ever fires.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Remove all pm_runtime and genpd calls from rknpu_power_on/off at runtime (Bug 30).
        # Despite Bug 25 (genpd always-on) and Bug 26 (dev always-on) keeping pm_runtime
        # usage counts >=1 and status=RPM_ACTIVE after probe, pm_runtime_resume_and_get()
        # and pm_runtime_get_sync() in rknpu_power_on() still trigger SCMI power-domain
        # operations into ATF at EL3 which cause a hard hang on mainline RK3588.
        # Nuclear fix: strip all pm_runtime and genpd pm_runtime_put_sync calls from
        # rknpu_power_on() and rknpu_power_off().  Power domains remain always-on via
        # probe's Bug 25/26 get_noresume anchors; clocks remain always-on via Bug 27.
        # The hardware is fully functional; we just never issue runtime PM transitions.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        # Bug 31: make rknpu_power_off() a complete no-op.
        # After probe's rknpu_power_on() enables clocks (refcount 0->1 via SCMI, works
        # at boot) and regulators, probe then calls rknpu_power_off() which was (even
        # after Bug 30) still calling clk_bulk_disable_unprepare() and
        # regulator_disable().  Bug 27's extra clk_bulk_prepare_enable() in probe keeps
        # the clock refcount at 2 after power_on, so power_off's disable decrements to 1
        # (no SCMI clock-disable).  But regulators go from 1->0 in probe's power_off
        # and are re-enabled 0->1 (SCMI) on the first ioctl's rknpu_power_on() call.
        # Fix: make rknpu_power_off() return 0 immediately.  Probe leaves all hardware
        # powered.  Every subsequent runtime power_on just increments refcounts (no
        # SCMI boundary crossed). power_off is permanently suppressed.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 40: RKNPU_GET_VOLT ioctl calls regulator_get_voltage(rknpu_dev->vdd)
        # without a NULL check.  On mainline kernel (no "rknpu-supply" in DT),
        # devm_regulator_get_optional() returns -ENODEV and probe sets vdd=NULL.
        # librknnrt.so v2.3.x calls RKNPU_GET_VOLT during init_runtime() to
        # query the NPU voltage — passing NULL to regulator_get_voltage() causes
        # an immediate kernel panic (NULL dereference in regulator_get_voltage→rdev).
        # Fix: guard the call with an if-NULL-then-zero check.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 45: prevent fdab9000.iommu from clock-gating itself during rknpu operation.
        # The rockchip-iommu driver suspends the NPU IOMMU (disables its clocks via
        # runtime PM) when no driver holds a PM reference.  rknpu in non-iommu mode
        # never attaches to the IOMMU framework, so usage_count stays 0 and the IOMMU
        # enters RPM_SUSPENDED immediately after probe.  The IOMMU hardware is still
        # physically in the AXI DMA path; with its clocks gated, NPU DMA transactions
        # (RKNPU_SUBMIT during init_runtime) hang the AXI bus -- hard lockup, no
        # kernel panic, no pstore data.
        # Fix: during probe, find the IOMMU platform device via the DT "iommus"
        # phandle and call pm_runtime_get_noresume() to permanently prevent it from
        # entering runtime suspend.  The IOMMU hardware clocks stay on for the
        # lifetime of the rknpu driver, keeping the DMA path functional.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 45v2: pm_runtime_get_noresume() does NOT wake a device already in
        # RPM_SUSPENDED -- it only bumps usage_count.  The IOMMU is already suspended
        # by the time rknpu_probe reaches the Bug 45 block, so clocks stay gated.
        # Fix: replace with pm_runtime_get_sync() (actively resumes the device,
        # re-enabling clocks) + pm_runtime_get_noresume() (permanent anchor).
        # Mirrors the Bug 32/33 pattern used for the main rknpu device.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 46: Bugs 45/45v2 had the correct diagnosis (fdab9000.iommu suspended
        # blocks NPU DMA -> AXI lockup) but the wrong fix mechanism.
        # of_parse_phandle(dev->of_node, "iommus", 0) returns NULL because
        # rknpu@fdab0000 has NO "iommus" DT property -- only npu@fdab0000 has it.
        # So the get_sync/get_noresume call in Bug 45v2 never executed, and
        # fdab9000.iommu stayed suspended (confirmed: runtime_status=suspended).
        # Fix: replace the else-branch dev_warn with code that finds fdab9000.iommu
        # directly by its platform-bus device name using bus_find_device_by_name(),
        # bypassing the DT phandle entirely.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 52: extend IOMMU wake-hold from single core (fdab9000 only) to all
        # three NPU sub-cores.  With the DT fix (iommus = <0x66 0x67 0x68> added
        # to rknpu@fdab0000), IOMMU mode is active and fdac9000/fdad9000 must also
        # be held awake or CORE_1/2 DMA hangs with AXI bus lockup (same root cause
        # as Bug 45).  Replace the Bug 45+45v2+46 single-index block with a loop
        # over phandle indices 0..2; retain Bug 46 device-name fallback for the
        # non-IOMMU case (covers all 3 devices).
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        # Bug 55 rev 13: add dev_info debug print after last_task assignment to
        # capture first_task->regcmd_addr, first_task->int_mask, and
        # args->task_base_addr at job commit time.  Uses chr(92)+'n' to produce
        # the two-char C escape \n without Python string-literal interference.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"

        # Bug 55 rev 15: diagnostic — immediate INT_RAW_STATUS after OP_EN.
        #
        # Rev 14 hypothesis (PC_DMA_BASE_ADDR=0 causes ILLEGAL_PARAM) is
        # incorrect: the mainline rocket driver explicitly writes 0x0 to
        # REG_PC_TASK_DMA_BASE_ADDR (0x34) and works.  Rev 14 was applied but
        # the failure mode was IDENTICAL — bits 30+31 still set, no IRQs fired.
        # Rev 14 is therefore not applied here.
        #
        # Rev 15 adds two new fields to the BUG55 debug print emitted after
        # PC_OP_EN fires:
        #   rga = first_task->regcfg_amount (drives PC_DATA_AMOUNT calculation)
        #   pca = computed PC_DATA_AMOUNT value written to hardware
        #   imm = INT_RAW_STATUS read immediately after OP_EN
        #
        # If imm shows bits 30+31 instantly, the hardware rejects the submitted
        # parameters at OP_EN time.  If imm is 0, the hardware never started or
        # completed via a different mechanism.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        echo "BUG55 rev15 patch: OK"

        # Bug 55 rev 16: three INT_RAW_STATUS reads to pinpoint when bits 30+31
        # (ILLEGAL_PARAM / DMA fault) first appear in rknpu_job_subcore_commit_pc.
        #
        # r16a: before any NPU register writes (stale state from previous job?)
        # r16b: after the multi-core sync writes at offset 0x1004/0x3004
        # r16c: after INT_CLEAR write (bits 30+31 cannot be cleared by 0x1ffff;
        #        only rknpu_soft_reset() clears them — so if r16c still shows them
        #        it confirms they are sticky from a previous fault)
        #
        # Combined with r15 (after OP_EN), the four prints show exactly where
        # bits 30+31 first appear, identifying the root cause.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        echo "BUG55 rev16 patch: OK"

        # Bug 55 rev 19: fix sync register TARGET for single-core NPU jobs.
        #
        # Rev 18 analysis: rev 18 changed the rank VALUE written to 0x1004/0x3004
        # from rank(core_index) to rank(num_irqs-1) for single-core jobs, but kept
        # using the CURRENT core's MMIO base (base[core_index]) for the write.
        # Result: for ci=0, value 0x2000000e was written to base[0]+0x1004 — but
        # the hardware still timed out. Identical failure pattern to before rev 18.
        #
        # Root cause update: the RK3588 NPU global execution trigger checks whether
        # rank (num_irqs-1) was written to BASE[num_irqs-1]+0x1004, not just any
        # core's sync register. Writing the correct rank value to the wrong core's
        # MMIO base does not satisfy the trigger condition.
        #
        # Evidence:
        #   ci=2 (base[2]+0x1004 = rank 2): always succeeds
        #   ci=0 rev18 (base[0]+0x1004 = rank 2): still fails
        #   ci=0 base[0]+0x1004 = rank 0: fails (original driver)
        # Only when base[num_irqs-1]+0x1004 receives rank (num_irqs-1) does OP_EN
        # start the executing core. Writing the same value to a different base
        # is irrelevant to the trigger.
        #
        # Fix: for single-core jobs, use _REG_WRITE with base[num_irqs-1] to write
        # rank (num_irqs-1) to the highest-rank core's sync register, regardless of
        # which core is executing. Multi-core jobs unchanged (each core still writes
        # its own rank to its own base via REG_WRITE).
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        echo "BUG55 rev19 patch: OK"
        echo "BUG55 rev19 cache-buster: 2026-04-30-sync-target-core-fix"

        # Bug 55 rev 20: call rknpu_soft_reset() at probe time to clear the
        # hardware's sticky INT_RAW_STATUS fault bits before any job runs.
        #
        # Root cause (confirmed from dmesg of very first job after boot):
        #   r16a: ci=0 irs_pre=0xc0000000  (bits 30+31 SET at cold reset)
        #   r16a: ci=1 irs_pre=0x40000000  (bit 30 set)
        #   r16a: ci=2 irs_pre=0x40000000  (bit 30 set)
        #
        # Bits 30 (ILLEGAL_PARAM) and 31 (DMA fault) are set in INT_RAW_STATUS
        # from the moment the hardware powers on — NOT from any previous job.
        # Writing INT_CLEAR (int_mask=0x300) does NOT clear bits 30+31; they
        # are latched by the hardware reset state and are only cleared by a
        # full soft reset.  With bit 30 set on core 0 at job commit time, the
        # hardware treats the job parameters as illegal, rejects the dispatch,
        # and run_task_counter remains 0 — so no IRQ ever fires, the job times
        # out, and inference fails with "failed to submit!".
        #
        # Fix: call rknpu_soft_reset() once during probe, after rknpu_power_on()
        # and clk_bulk_prepare_enable() (Bug 27) have brought the hardware up,
        # so the reset sequence can write the NPU control registers safely.
        # This clears the sticky bits on all three cores before the first
        # RKNPU_SUBMIT ioctl arrives.  rknpu_soft_reset() is already called on
        # job timeout (rknpu_job.c lines 622, 737) so calling it at probe is
        # the same mechanism applied one step earlier.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        echo "BUG55 rev20 patch: OK"
        echo "BUG55 rev20 cache-buster: 2026-04-30-probe-soft-reset"

        # Bug 55 rev 21: acknowledge sticky fault bits 30+31 (ILLEGAL_PARAM /
        # DMA fault) in INT_RAW_STATUS before writing OP_EN.
        #
        # Root cause analysis:
        #   The NPU hardware reset default state has bit 30 (ILLEGAL_PARAM) and
        #   bit 31 (DMA fault) set in INT_RAW_STATUS on core 0, and bit 30 set
        #   on cores 1 and 2.  The existing job init path writes
        #   int_mask=0x300 (bits 8+9 = job-done IRQ enables) to INT_CLEAR.
        #   Bits 30 and 31 are outside the INT_CLEAR domain of bits 8+9 and
        #   are therefore never cleared.  With bit 31 (DMA fault) still set at
        #   OP_EN time, the hardware sees an active DMA fault condition and
        #   refuses to start the job on core 0 — run_task_counter stays 0, no
        #   completion IRQ ever fires, and the job times out.
        #
        #   Evidence: core 2 has only bit 30 set and still accepts OP_EN
        #   (bit 30 is cleared after OP_EN → job starts).  Core 0 has BOTH
        #   bits 30 and 31, and the bits remain unchanged after OP_EN → job
        #   rejected.  Bit 31 (DMA fault) is the blocker.
        #
        # Fix: write 0xffffffff to INT_CLEAR before the normal int_mask write.
        # INT_CLEAR is a write-1-to-clear register; this acknowledges all
        # interrupt bits including 30+31, removing the fault condition that
        # blocks OP_EN.  A diagnostic print of INT_RAW_STATUS immediately
        # after the full clear reveals whether this succeeds.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        echo "BUG55 rev21 patch: OK"
        echo "BUG55 rev21 cache-buster: 2026-04-30-full-int-clear"

        # Bug 55 rev 22: add rk3588_state_init to rknpu_drv.c.
        #
        # Root cause (confirmed by rev 21):
        #   Writing 0xffffffff to INT_CLEAR (offset 0x24) does NOT clear bits
        #   30+31 in INT_RAW_STATUS.  INT_CLEAR is only write-1-to-clear for
        #   bits 0-16 (RKNPU_INT_CLEAR = 0x1ffff).  Bits 30+31 are genuinely
        #   not W1C via this register.
        #
        # Fix:
        #   The RK3576 upstream driver has rk3576_state_init() which writes
        #   0x80000000 (bit 31 = DMA fault) to core_base + 0x1024.  The
        #   secondary register bank is offset +0x1000 from each core base, and
        #   +0x24 within that bank is INT_CLEAR — so this is a write to the
        #   secondary INT_CLEAR that is capable of clearing bit 31.  RK3588 had
        #   state_init = NULL, so this step was never performed.  Adding an
        #   equivalent rk3588_state_init that iterates all 3 cores and writes
        #   0x80000000 to base[i] + 0x1024 should clear the sticky DMA-fault
        #   bit before any job is submitted, allowing OP_EN to succeed on core 0.
        python3 -c "import base64,sys; exec(base64.b64decode(b'').decode())"
        echo "BUG55 rev22 patch: OK"
        echo "BUG55 rev22 cache-buster: 2026-04-30-rk3588-state-init"

    build:
      - |
        # Diagnostic: confirm Kbuild content visible to the build step.
        echo "=== $(pwd)/Kbuild ===" && cat "$(pwd)/Kbuild" && echo "=== end Kbuild ==="
        # Build rknpu.ko against the Talos kernel source.
        # -C /src: invoke the kernel Makefile (which has the 'modules' target)
        # M=$(pwd): tells the kernel build system where the OOT module lives
        # LLVM=1: Talos 1.13.x kernel is Clang/ThinLTO-built; OOT module must
        # also use Clang to produce compatible relocations and IR ABI.
        make -j "$(nproc)" \
          -C /src \
          M="$(pwd)" \
          ARCH=arm64 \
          LLVM=1 \
          modules
    install:
      - |
        KERNEL_RELEASE=$(cat /src/include/config/kernel.release)

        # Talos enforces module.sig_enforce=1: every .ko must be signed with
        # the key used to build the kernel.  The kernel-build stage keeps the
        # signing key at /src/certs/signing_key.pem and the matching X.509
        # certificate at /src/certs/signing_key.x509.  Sign before install.
        /src/scripts/sign-file sha512 \
          /src/certs/signing_key.pem \
          /src/certs/signing_key.x509 \
          rknpu.ko

        install -D -m 644 rknpu.ko \
          /rootfs/usr/lib/modules/${KERNEL_RELEASE}/kernel/drivers/rknpu/rknpu.ko

        # udev rule: create /dev/rknpu and /dev/dma_heap/system with world-read/write
        # so unprivileged containers can access them via CDI injection.
        install -D -m 644 /pkg/files/90-rknpu.rules \
          /rootfs/usr/lib/udev/rules.d/90-rknpu.rules

        # Static CDI spec: Talos 1.13 enables CDI in containerd by default.
        # Placing the spec at /etc/cdi/ in the extension squashfs means containerd
        # discovers it on startup without any machine config patch.
        install -D -m 644 /pkg/files/rockchip-npu.cdi.yaml \
          /rootfs/etc/cdi/rockchip-npu.yaml
    test:
      - |
        find /rootfs/usr/lib/modules -name '*.ko' | grep -q '.' || \
          (echo "ERROR: no .ko files found in /rootfs" && exit 1)
        echo "rknpu.ko OK"
finalize:
  - from: /rootfs
    to: /rootfs
  - from: /pkg/manifest.yaml
    to: /
# {{ else }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
# Non-aarch64 builds produce an empty extension (RK3588 is ARM64-only).
dependencies:
  - stage: base
steps:
  - prepare:
      - |
        mkdir /rootfs
finalize:
  - from: /pkg/manifest.yaml
    to: /manifest.yaml
  - from: /rootfs
    to: /rootfs
  # {{ end }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
