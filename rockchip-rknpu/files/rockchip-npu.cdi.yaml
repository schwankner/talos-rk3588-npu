cdiVersion: "0.6.0"
kind: "rockchip.com/npu"
devices:
  - name: "0"
    containerEdits:
      deviceNodes:
        - path: "/dev/rknpu"
          permissions: "rw"
        - path: "/dev/dma_heap/system"
          permissions: "rw"
      mounts:
        - hostPath: "/usr/lib/librknnrt.so"
          containerPath: "/usr/lib/librknnrt.so"
          options: ["ro", "bind"]
