---
# RK3588 NPU Device Plugin DaemonSet
#
# Runs on every node labeled rockchip.com/npu-capable=true.
# Discovers the NPU misc device /dev/rknpu (registered by rknpu.ko).
# Registers rockchip.com/npu with the kubelet and writes the CDI spec to
# /var/run/cdi/rockchip-npu.yaml so containerd injects /dev/rknpu,
# /dev/dma_heap/system, and librknnrt.so into requesting containers.
#
# Label NPU-capable nodes before deploying:
#   kubectl label node <node-name> rockchip.com/npu-capable=true
#
# Usage in a pod:
#   spec:
#     containers:
#       - resources:
#           limits:
#             rockchip.com/npu: "1"
#
# Up to 3 pods can hold rockchip.com/npu simultaneously (one per NPU core).
# All slots share /dev/rknpu; the RKNN runtime distributes work across cores.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rk3588-npu-device-plugin
  namespace: kube-system
  labels:
    app: rk3588-npu-device-plugin
spec:
  selector:
    matchLabels:
      app: rk3588-npu-device-plugin
  template:
    metadata:
      labels:
        app: rk3588-npu-device-plugin
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
          effect: NoSchedule

      nodeSelector:
        kubernetes.io/arch: arm64

      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: rockchip.com/npu-capable
                    operator: In
                    values: ["true"]

      containers:
        - name: rk3588-npu-device-plugin
          image: ghcr.io/schwankner/rk3588-npu-device-plugin:f890827
          imagePullPolicy: Always

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
            - name: cdi
              mountPath: /var/run/cdi

      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: cdi
          hostPath:
            path: /var/run/cdi
            type: DirectoryOrCreate
