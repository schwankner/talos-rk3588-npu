---
# RKNN NPU benchmark Job — YOLOv5s INT8
# Model: YOLOv5s ReLU variant, 640×640, INT8 quantized, ~16 GFLOPS
# ReLU activation maps all ops to NPU (no SiLU CPU fallback ops).
# Compiled with rknn-toolkit2 2.3.2 (= librknnrt.so version).
# Expected: ~50+ fps on NPU vs ~5 fps on CPU → ~10× speedup.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu-yolov5s
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v17
          imagePullPolicy: Always
          args: ["--mode", "npu", "--model", "yolov5s", "--iterations", "100"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
