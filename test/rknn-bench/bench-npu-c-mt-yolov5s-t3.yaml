---
# RKNN C API multi-thread benchmark — YOLOv5s INT8, 3 threads
# 3 concurrent rknn_context threads, each pinned to a distinct NPU core
# (thread 0→CORE_0, 1→CORE_1, 2→CORE_2).
# Expected aggregate: ~3× single-thread = ~75 fps vs ~21 fps CPU → ~3.5× speedup.
# Fewer iterations (200/thread) to avoid thermal throttling on the sustained run.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu-c-mt-yolov5s-t3
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v15
          imagePullPolicy: Always
          command: ["/bench_c_mt", "/model/yolov5s.rknn", "yolov5s", "3", "200", "20"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "4"
              memory: 1Gi
            requests:
              cpu: "2"
              memory: 512Mi
