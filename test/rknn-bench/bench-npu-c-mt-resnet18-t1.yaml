---
# RKNN C API multi-thread benchmark — ResNet18 INT8, 1 thread (baseline)
# Single concurrent context: matches bench_c single-thread result (~146 fps).
# Used as the baseline for the thread-scaling comparison.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu-c-mt-resnet18-t1
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v17
          imagePullPolicy: Always
          command: ["/bench_c_mt", "/model/resnet18.rknn", "resnet18", "1", "1000", "50"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "4"
              memory: 512Mi
            requests:
              cpu: "2"
              memory: 256Mi
