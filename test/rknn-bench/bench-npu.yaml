---
# RKNN NPU benchmark Job
# Runs YOLOv5s (640x640, ~16 GFLOPS) inferences on the RK3588 NPU via CDI.
# CDI provides: /dev/rknpu (BSP misc device), /usr/lib/librknnrt.so
#
# SoC detection: handled by dt_compat_shim.so LD_PRELOAD baked into the image.
# No procMount:Unmasked or hostUsers:false required.
#
# Expected result: ~30-100 fps (< 30 ms/inference) for YOLOv5s
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v22
          imagePullPolicy: Always
          args: ["--mode", "npu", "--model", "yolov5s", "--iterations", "200"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
