---
# RKNN NPU benchmark Job
# Runs 200 ResNet18 inferences on the RK3588 NPU via CDI injection.
# CDI provides: /dev/rknpu (BSP misc device), /usr/lib/librknnrt.so
#
# SoC detection: rknnlite's Cython code opens /proc/device-tree/compatible at
# the C level (bypasses Python builtins.open patches). procMount: Unmasked +
# hostUsers: false unmasks /proc so the real device-tree file is accessible.
# Requires Talos kernel 6.18+ (MOUNT_ATTR_IDMAP tmpfs support).
#
# Expected result: ~100-300 fps (< 10 ms/inference)
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      hostUsers: false
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v18
          imagePullPolicy: Always
          args: ["--mode", "npu", "--iterations", "200"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            procMount: Unmasked
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
