---
# RKNN NPU benchmark Job
# Runs 200 ResNet18 inferences on the RK3588 NPU via CDI injection.
# CDI provides: /dev/dri/renderD128, /dev/dri/card0, /usr/lib/librknnrt.so
#
# SoC detection: rknnlite reads /proc/device-tree/compatible.
# /sys/firmware is masked read-only in pods; bench.py patches builtins.open
# to intercept that specific path and return the known RK3588 compatible string,
# allowing rknnlite's Cython _get_target_soc to set its internal target_soc
# C-struct field correctly.
#
# Expected result: ~100-300 fps (< 10 ms/inference)
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v12
          imagePullPolicy: Always
          args: ["--mode", "npu", "--iterations", "200"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
