---
# RKNN NPU benchmark Job
# Runs ResNet50 (224x224, ~8 GFLOPS fp16) on the RK3588 NPU.
# Model compiled with rknn-toolkit2 2.3.2 — same version as librknnrt.so.
# Expected: 30-100 fps on NPU vs 1-5 fps on CPU → 10-50x speedup.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v23
          imagePullPolicy: Always
          args: ["--mode", "npu", "--model", "resnet50", "--iterations", "200"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
