---
# RKNN NPU benchmark Job
# Runs 200 ResNet18 inferences on the RK3588 NPU via CDI injection.
# CDI provides: /dev/rknpu (BSP misc device), /usr/lib/librknnrt.so
#
# SoC detection: rknnlite's Cython init_runtime() opens
# /proc/device-tree/compatible at the C level.  The image ships a
# dt_compat_shim.so (LD_PRELOAD) that intercepts this specific open()
# and returns the RK3588 compatible string from a memfd — no
# procMount:Unmasked or hostUsers:false required.
#
# Expected result: ~100-300 fps (< 10 ms/inference)
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v19
          imagePullPolicy: Always
          args: ["--mode", "npu", "--iterations", "200"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
