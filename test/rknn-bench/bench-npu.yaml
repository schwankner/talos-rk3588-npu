---
# RKNN NPU benchmark Job — ResNet18 INT8
# Model: ResNet18-v2, 224×224, INT8 quantized, ~1.8 GFLOPS
# Compiled with rknn-toolkit2 2.3.2 (= librknnrt.so version).
# Expected: ~200+ fps on NPU vs ~20 fps on CPU → ~10× speedup.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v15
          imagePullPolicy: Always
          args: ["--mode", "npu", "--model", "resnet18", "--iterations", "200"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
