---
# RKNN C API multi-thread benchmark — ResNet18 INT8, 6 threads
# 6 concurrent rknn_context threads = 2 per RK3588 NPU core (NPU_CORE_AUTO).
# Tests whether the NPU scheduler can queue 2 jobs per core without stalling.
# Expected: close to 3-thread result (NPU is the bottleneck, not thread count).
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu-c-mt-resnet18-t6
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v14
          imagePullPolicy: Always
          command: ["/bench_c_mt", "/model/resnet18.rknn", "resnet18", "6", "1000", "50"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "6"
              memory: 768Mi
            requests:
              cpu: "3"
              memory: 384Mi
