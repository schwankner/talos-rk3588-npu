---
# RKNN C API multi-thread benchmark — ResNet18 INT8, 3 threads
# 3 concurrent rknn_context threads = one per RK3588 NPU core (NPU_CORE_AUTO).
# All threads start simultaneously via pthread barrier.
# Expected aggregate: ~3× single-thread = ~430 fps.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu-c-mt-resnet18-t3
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v14
          imagePullPolicy: Always
          command: ["/bench_c_mt", "/model/resnet18.rknn", "resnet18", "3", "1000", "50"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "4"
              memory: 512Mi
            requests:
              cpu: "2"
              memory: 256Mi
