---
# Step-by-step RKNN crash diagnosis (v21 image)
# Runs each phase of init_runtime separately, logging to hostPath after each.
# The last line in /var/npu-hwtest/steptest.log tells us where the crash occurs.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-step-v21
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v21
          imagePullPolicy: IfNotPresent
          command: ["python3", "-c"]
          args:
            - |
              import os, sys, time, fcntl, struct

              LOG = open('/var/npu-hwtest/steptest.log', 'w', buffering=1)
              def L(s):
                  t = f'{time.time():.3f}'
                  line = f'{t} {s}'
                  LOG.write(line + '\n'); LOG.flush(); os.fsync(LOG.fileno())
                  print(line, flush=True)

              import builtins, io
              _real_open = builtins.open
              _DT_COMPAT = b'turing,rk1\x00rockchip,rk3588\x00'
              def _patched_open(file, mode='r', *a, **kw):
                  if str(file) == '/proc/device-tree/compatible':
                      return io.BytesIO(_DT_COMPAT) if (isinstance(mode,str) and 'b' in mode) else io.StringIO(_DT_COMPAT.decode('utf-8', errors='ignore'))
                  return _real_open(file, mode, *a, **kw)
              builtins.open = _patched_open

              L('STEP 0: start')
              L(f'STEP 0: /dev/rknpu exists={os.path.exists("/dev/rknpu")}')
              L(f'STEP 0: /dev/dma_heap/system exists={os.path.exists("/dev/dma_heap/system")}')
              L(f'STEP 0: librknnrt.so exists={os.path.exists("/usr/lib/librknnrt.so")}')

              # raw open/close only
              fd = os.open('/dev/rknpu', os.O_RDWR)
              L(f'STEP 0: raw open /dev/rknpu fd={fd} OK')
              os.close(fd)
              L('STEP 0: raw close OK')

              L('STEP 1: import rknnlite')
              from rknnlite.api import RKNNLite
              L('STEP 1: import done')

              L('STEP 2: RKNNLite()')
              rknn = RKNNLite(verbose=False)
              L('STEP 2: done')

              L('STEP 3: load_rknn')
              ret = rknn.load_rknn('/model/resnet18.rknn')
              L(f'STEP 3: done ret={ret}')
              if ret != 0:
                  L('STEP 3: FAILED')
                  sys.exit(1)

              L('STEP 4: init_runtime(core_mask=NPU_CORE_AUTO) -- crash likely here')
              ret = rknn.init_runtime(core_mask=RKNNLite.NPU_CORE_AUTO)
              L(f'STEP 4: done ret={ret}')
              if ret != 0:
                  L('STEP 4: FAILED (non-zero return, no crash)')
                  sys.exit(1)

              L('STEP 5: init_runtime SUCCEEDED -- running 1 warmup inference')
              import numpy as np
              inp = np.zeros((1, 3, 224, 224), dtype=np.uint8)
              rknn.inference(inputs=[inp])
              L('STEP 5: warmup inference done')

              L('STEP 6: running 10 benchmark inferences')
              t0 = time.perf_counter()
              for _ in range(10):
                  rknn.inference(inputs=[inp])
              elapsed = time.perf_counter() - t0
              fps = 10 / elapsed
              L(f'STEP 6: done fps={fps:.1f} latency_ms={elapsed/10*1000:.2f}')

              rknn.release()
              L('STEP 7: ALL STEPS COMPLETED SUCCESSFULLY')

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
          volumeMounts:
            - name: steptest-log
              mountPath: /var/npu-hwtest
      volumes:
        - name: steptest-log
          hostPath:
            path: /var/npu-hwtest
            type: DirectoryOrCreate
