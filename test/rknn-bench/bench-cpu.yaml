---
# RKNN CPU baseline benchmark Job
# Runs ResNet18 inferences WITHOUT the NPU resource as a CPU baseline.
# librknnrt.so falls back to ARM CPU execution.
#
# This pod does NOT get CDI injection (no rockchip.com/npu limit),
# so /dev/dri/renderD128 is absent → rknn falls back to CPU automatically.
# librknnrt.so is supplied via the hostPath volume below.
#
# Expected result: ~5-20 fps (50-200 ms/inference) — 10-50x slower than NPU
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-cpu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rknn-bench:v1
          imagePullPolicy: Always
          args: ["--mode", "cpu", "--iterations", "50"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # Manually bind librknnrt.so so the RKNN runtime can initialise
          # (without CDI it isn't injected automatically)
          volumeMounts:
            - name: librknnrt
              mountPath: /usr/lib/librknnrt.so
              readOnly: true
          resources:
            limits:
              cpu: "4"
              memory: 512Mi
            requests:
              cpu: "2"
              memory: 256Mi
      volumes:
        - name: librknnrt
          hostPath:
            path: /usr/lib/librknnrt.so
            type: File
