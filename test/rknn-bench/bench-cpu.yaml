---
# RKNN CPU baseline benchmark Job
# Runs ResNet18 inferences WITHOUT the NPU resource as a CPU baseline.
# librknnrt.so falls back to ARM CPU execution when /dev/rknpu is absent.
#
# librknnrt.so is supplied via hostPath volume — no CDI here.
# The hostPath type is omitted (not "File") because Talos system-extension
# files in /usr/lib are symlinks; type: File rejects symlinks.
#
# SoC detection: handled by the dt_compat_shim.so LD_PRELOAD baked into
# the image — intercepts C-level open("/proc/device-tree/compatible").
# No procMount:Unmasked or hostUsers:false required.
#
# Expected result: ~5-20 fps (50-200 ms/inference) — 10-50x slower than NPU
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-cpu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v21
          imagePullPolicy: Always
          args: ["--mode", "cpu", "--iterations", "50"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # Manually bind librknnrt.so so the RKNN runtime can initialise
          # (without CDI it isn't injected automatically)
          volumeMounts:
            - name: librknnrt
              mountPath: /usr/lib/librknnrt.so
              readOnly: true
          resources:
            limits:
              cpu: "4"
              memory: 512Mi
            requests:
              cpu: "2"
              memory: 256Mi
      volumes:
        - name: librknnrt
          hostPath:
            path: /usr/lib/librknnrt.so
            # type omitted — Talos system-extension files are symlinks,
            # and "File" would reject them
