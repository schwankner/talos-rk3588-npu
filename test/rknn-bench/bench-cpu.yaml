---
# RKNN CPU baseline benchmark Job
# Runs ResNet18 inferences on ARM CPU cores.
#
# librknnrt.so always requires /dev/rknpu and /dev/dma_heap/system to
# initialise, even when inference runs on CPU — it uses the driver for
# memory allocation.  We therefore still request rockchip.com/npu: "1"
# so CDI injects those devices; the CPU-vs-NPU distinction is in how
# bench.py calls init_runtime: --mode cpu passes no core_mask, so
# librknnrt.so runs inference on ARM CPU cores rather than NPU cores.
#
# SoC detection: procMount:Unmasked + hostUsers:false (same as NPU bench)
# so librknnrt.so can read /proc/device-tree/compatible.
#
# Expected result: ~5-20 fps (50-200 ms/inference) — 10-50x slower than NPU
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-cpu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      hostUsers: false
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v21
          imagePullPolicy: IfNotPresent
          args: ["--mode", "cpu", "--iterations", "50"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            procMount: Unmasked
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "4"
              memory: 512Mi
            requests:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 256Mi
