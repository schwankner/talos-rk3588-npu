---
# RKNN CPU baseline benchmark Job
# Runs YOLOv5s (640x640, ~16 GFLOPS) on ARM CPU cores (no NPU cores).
#
# librknnrt.so requires /dev/rknpu and /dev/dma_heap/system to initialise
# even in CPU fallback mode.  We request rockchip.com/npu: "1" so CDI
# injects the devices; --mode cpu calls init_runtime() without a core_mask
# so inference runs on ARM Cortex-A76 NEON rather than NPU cores.
#
# SoC detection: handled by dt_compat_shim.so LD_PRELOAD baked into the image.
#
# Expected result: ~1-5 fps (200-1000 ms/inference) — 10-50x slower than NPU
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-cpu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v22
          imagePullPolicy: Always
          args: ["--mode", "cpu", "--model", "yolov5s", "--iterations", "20"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "4"
              memory: 512Mi
            requests:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 256Mi
