---
# RKNN CPU baseline benchmark Job
# Runs ResNet18 inferences WITHOUT the NPU resource as a CPU baseline.
# librknnrt.so falls back to ARM CPU execution.
#
# This pod does NOT request rockchip.com/npu, so /dev/rknpu is absent
# and librknnrt.so falls back to CPU automatically.
# librknnrt.so is supplied via the hostPath volume below.
#
# procMount: Unmasked + hostUsers: false: rknnlite's Cython init_runtime()
# opens /proc/device-tree/compatible at the C level to detect the SoC —
# even in CPU mode.  Without this the C-level open() fails and init_runtime
# returns -1.
#
# Expected result: ~5-20 fps (50-200 ms/inference) — 10-50x slower than NPU
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-cpu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      hostUsers: false
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v18
          imagePullPolicy: Always
          args: ["--mode", "cpu", "--iterations", "50"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            procMount: Unmasked
          # Manually bind librknnrt.so so the RKNN runtime can initialise
          # (without CDI it isn't injected automatically)
          volumeMounts:
            - name: librknnrt
              mountPath: /usr/lib/librknnrt.so
              readOnly: true
          resources:
            limits:
              cpu: "4"
              memory: 512Mi
            requests:
              cpu: "2"
              memory: 256Mi
      volumes:
        - name: librknnrt
          hostPath:
            path: /usr/lib/librknnrt.so
            type: File
