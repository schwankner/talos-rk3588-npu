---
# RKNN CPU baseline benchmark Job — ResNet18 INT8
# Runs the same INT8 model on ARM CPU cores (no NPU) for comparison.
# librknnrt.so still requires /dev/rknpu to init — CDI injects it via
# rockchip.com/npu: "1"; --mode cpu calls init_runtime() without core_mask.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-cpu
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v13
          imagePullPolicy: Always
          args: ["--mode", "cpu", "--model", "resnet18", "--iterations", "30"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "4"
              memory: 512Mi
            requests:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 256Mi
