---
# RKNN C API benchmark Job — YOLOv5s INT8
#
# Uses the native C API (rknn_init/rknn_run/rknn_outputs_get) directly,
# bypassing the 3-5 ms Python/rknnlite per-call overhead to show true NPU
# throughput.  Expected: ~60-100 fps (vs ~26 fps with Python overhead).
#
# This job runs /bench_c (compiled in the v13 image), not bench.py.
apiVersion: batch/v1
kind: Job
metadata:
  name: rknn-bench-npu-c-yolov5s
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/schwankner/rk3588-rknn-bench:v17
          imagePullPolicy: Always
          # Override ENTRYPOINT to run the C binary directly.
          command: ["/bench_c", "/model/yolov5s.rknn", "yolov5s", "500", "20"]
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              rockchip.com/npu: "1"
              cpu: "2"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 256Mi
