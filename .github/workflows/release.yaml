name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.12.6-rknpu0.9.8-rc1)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build-extensions:
    name: Build system extensions
    uses: ./.github/workflows/build-extensions.yaml
    secrets: inherit

  build-plugin:
    name: Build device plugin
    uses: ./.github/workflows/build-device-plugin.yaml
    secrets: inherit

  build-installer:
    name: Build custom installer
    needs: [build-extensions]
    uses: ./.github/workflows/build-installer.yaml
    secrets: inherit

  release:
    name: Create GitHub Release
    needs: [build-extensions, build-plugin, build-installer]
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Read version pins
        id: versions
        run: |
          source scripts/common.sh
          echo "TALOS_VERSION=${TALOS_VERSION}"               >> "${GITHUB_OUTPUT}"
          echo "KERNEL_VERSION=${KERNEL_VERSION}"             >> "${GITHUB_OUTPUT}"
          echo "RKNPU_VERSION=${RKNPU_VERSION}"               >> "${GITHUB_OUTPUT}"
          echo "RKNN_RUNTIME_VERSION=${RKNN_RUNTIME_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Determine release tag
        id: ref
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"
          else
            echo "TAG=${{ github.event.inputs.tag }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export extension OCI tarballs
        id: artifacts
        run: |
          source scripts/common.sh
          OWNER="${{ github.repository_owner }}"

          RKNPU_IMAGE="ghcr.io/${OWNER}/rockchip-rknpu:${RKNPU_VERSION}-${KERNEL_VERSION}"
          RKNN_IMAGE="ghcr.io/${OWNER}/rockchip-rknn-libs:${RKNN_RUNTIME_VERSION}-${KERNEL_VERSION}"

          RKNPU_FILE="rockchip-rknpu-${RKNPU_VERSION}-${KERNEL_VERSION}.tar"
          RKNN_FILE="rockchip-rknn-libs-${RKNN_RUNTIME_VERSION}-${KERNEL_VERSION}.tar"

          echo "Pulling ${RKNPU_IMAGE}..."
          docker pull --platform linux/arm64 "${RKNPU_IMAGE}"
          docker save "${RKNPU_IMAGE}" -o "${RKNPU_FILE}"

          echo "Pulling ${RKNN_IMAGE}..."
          docker pull --platform linux/arm64 "${RKNN_IMAGE}"
          docker save "${RKNN_IMAGE}" -o "${RKNN_FILE}"

          echo "RKNPU_FILE=${RKNPU_FILE}" >> "${GITHUB_OUTPUT}"
          echo "RKNN_FILE=${RKNN_FILE}"   >> "${GITHUB_OUTPUT}"

          # Checksums for verification
          sha256sum "${RKNPU_FILE}" "${RKNN_FILE}" > SHA256SUMS

      - name: Determine if prerelease
        id: prerelease
        run: |
          TAG="${{ steps.ref.outputs.TAG }}"
          if [[ "${TAG}" == *"-rc"* ]] || [[ "${TAG}" == *"-alpha"* ]] || [[ "${TAG}" == *"-beta"* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create release body
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ steps.ref.outputs.TAG }}"
          cat > /tmp/release-body.md <<EOF
          ## Talos RK3588 NPU — ${TAG}

          | Component | Version |
          |-----------|---------|
          | Talos | ${{ steps.versions.outputs.TALOS_VERSION }} |
          | Kernel | ${{ steps.versions.outputs.KERNEL_VERSION }} |
          | rknpu driver | ${{ steps.versions.outputs.RKNPU_VERSION }} |
          | librknnrt | ${{ steps.versions.outputs.RKNN_RUNTIME_VERSION }} |

          ## System Extensions

          Reference directly in your Talos machine config under \`machine.install.extensions\`:

          \`\`\`yaml
          machine:
            install:
              extensions:
                - image: ghcr.io/${OWNER}/rockchip-rknpu:${{ steps.versions.outputs.RKNPU_VERSION }}-${{ steps.versions.outputs.KERNEL_VERSION }}
                - image: ghcr.io/${OWNER}/rockchip-rknn-libs:${{ steps.versions.outputs.RKNN_RUNTIME_VERSION }}-${{ steps.versions.outputs.KERNEL_VERSION }}
          \`\`\`

          The attached \`.tar\` files are OCI image archives for offline use:

          \`\`\`bash
          # Load into a local registry or use with crane/skopeo
          docker load < rockchip-rknpu-${{ steps.versions.outputs.RKNPU_VERSION }}-${{ steps.versions.outputs.KERNEL_VERSION }}.tar
          \`\`\`

          ## Installer

          Custom Talos installer with our kernel binary (required for module signing key to match):

          \`\`\`bash
          talosctl upgrade --nodes <IP> \\
            --image ghcr.io/${OWNER}/talos-rk3588-npu-installer:v${{ steps.versions.outputs.TALOS_VERSION#v }} \\
            --preserve
          \`\`\`

          ## Device Plugin

          \`\`\`yaml
          image: ghcr.io/${OWNER}/rk3588-npu-device-plugin:${TAG}
          \`\`\`

          See [deploy/device-plugin.yaml](https://github.com/${OWNER}/talos-rk3588-npu/blob/main/deploy/device-plugin.yaml) for the full DaemonSet manifest.

          ## Requirements

          - Talos ${{ steps.versions.outputs.TALOS_VERSION }} with \`sbc-rockchip\` overlay (via [factory.talos.dev](https://factory.talos.dev))
          - Kernel 6.18+ (for \`MOUNT_ATTR_IDMAP\` tmpfs — required by \`procMount: Unmasked\`)
          - Pods must set \`spec.hostUsers: false\` and \`containers[].securityContext.procMount: Unmasked\`
          - \`user.max_user_namespaces: "15000"\` sysctl on nodes
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ref.outputs.TAG }}
          name: "${{ steps.ref.outputs.TAG }}"
          body_path: /tmp/release-body.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            ${{ steps.artifacts.outputs.RKNPU_FILE }}
            ${{ steps.artifacts.outputs.RKNN_FILE }}
            SHA256SUMS
