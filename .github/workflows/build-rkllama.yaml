name: Build RKLLama

# Builds rkllama from source on a native ARM64 runner and pushes to our
# GHCR namespace.  Triggered manually or when the upstream rkllama source
# commit we pin changes.
#
# The official ghcr.io/notpunchnox/rkllama:main image has a broken ARM64
# build since 2026-04-07 (docker-container BuildKit driver pulls AMD64
# base layers even on ARM64 runners, see upstream PR #148).  Until that
# is fixed and released we maintain our own image.
#
# We use plain `docker build` (not docker/build-push-action with the
# docker-container Buildx driver) so that the local Docker daemon on the
# ARM64 runner builds natively without any BuildKit-container indirection.
#
# Image: ghcr.io/schwankner/rkllama:<RKLLAMA_COMMIT>
#        ghcr.io/schwankner/rkllama:latest
on:
  workflow_dispatch:
    inputs:
      rkllama_ref:
        description: "rkllama git ref to build (branch, tag, or commit SHA)"
        required: false
        default: "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: schwankner/rkllama

jobs:
  build:
    name: Build rkllama (ARM64)
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout rkllama source
        uses: actions/checkout@v4
        with:
          repository: NotPunchnox/rkllama
          ref: ${{ github.event.inputs.rkllama_ref || 'main' }}
          fetch-depth: 1

      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log into GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Use plain docker build against the native Docker daemon — NOT docker
      # buildx with the docker-container driver.  The docker-container driver
      # spawns a BuildKit container which can mis-detect architecture and pull
      # AMD64 base layers even on a native ARM64 host.
      - name: Build image
        run: |
          docker build \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            .

      - name: Verify architecture
        run: |
          arch=$(docker run --rm "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" uname -m)
          echo "Container reports: $arch"
          if [ "$arch" != "aarch64" ]; then
            echo "ERROR: expected aarch64, got $arch"
            exit 1
          fi

      - name: Push image
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Summary
        run: |
          echo "### RKLLama image built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source ref: \`${{ github.event.inputs.rkllama_ref || 'main' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
