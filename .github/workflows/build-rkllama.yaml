name: Build RKLLama

# Builds rkllama from source on a native ARM64 runner and pushes to our
# GHCR namespace.  Triggered manually or when the upstream rkllama source
# commit we pin changes.
#
# The official ghcr.io/notpunchnox/rkllama:main image has a broken ARM64
# build since 2026-04-07 (docker-container BuildKit driver pollutes the
# layer cache with AMD64 layers; see upstream PR #148).  Until that is
# fixed and released we maintain our own image.
#
# Root causes identified through debugging:
# 1. docker/build-push-action uses a docker-container Buildx driver whose
#    BuildKit container resolves base image layers as amd64 on ubuntu-24.04-arm.
# 2. Even plain 'docker build' can reuse stale amd64 layers from the
#    runner's layer cache populated by the buildx attempt.
# 3. 'uname -m' inside a container is unreliable: QEMU binfmt_misc returns
#    the HOST architecture, masking wrong-arch images.
#
# Fixes applied here:
# - 'docker build --platform linux/arm64' forces Docker to pull the arm64
#   variant of python:3.12-slim from the registry, bypassing any cached
#   amd64 layers.
# - Architecture verification reads the ELF machine type of a known binary
#   (/usr/local/bin/python3) rather than relying on uname -m.
#   EM_AARCH64 = 0xb7 at ELF header offset 18; EM_X86_64 = 0x3e.
#
# Image: ghcr.io/schwankner/rkllama:<RKLLAMA_COMMIT>
#        ghcr.io/schwankner/rkllama:latest
on:
  workflow_dispatch:
    inputs:
      rkllama_ref:
        description: "rkllama git ref to build (branch, tag, or commit SHA)"
        required: false
        default: "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: schwankner/rkllama

jobs:
  build:
    name: Build rkllama (ARM64)
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout rkllama source
        uses: actions/checkout@v4
        with:
          repository: NotPunchnox/rkllama
          ref: ${{ github.event.inputs.rkllama_ref || 'main' }}
          fetch-depth: 1

      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log into GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # --platform linux/arm64 forces Docker to pull the arm64 variant of
      # python:3.12-slim from the registry instead of reusing any stale amd64
      # layers that may be present in the runner's local layer cache from a
      # previous buildx run.
      - name: Build image
        run: |
          docker build \
            --platform linux/arm64 \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            .

      # Verify ELF machine type, NOT uname -m.
      # uname -m under QEMU/binfmt_misc always returns the host architecture,
      # so it cannot detect wrong-arch images.  Instead, read byte 18 of the
      # ELF header of /usr/local/bin/python3:
      #   0xb7 = EM_AARCH64 (arm64)  ← expected
      #   0x3e = EM_X86_64  (amd64)  ← means the build is broken
      - name: Verify ELF architecture is arm64
        run: |
          machine_byte=$(docker run --rm \
            --entrypoint /bin/sh \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            -c 'od -An -j18 -N1 -tx1 /usr/local/bin/python3 | tr -d " \n"')
          echo "ELF machine byte at offset 18: 0x${machine_byte}"
          if [ "$machine_byte" != "b7" ]; then
            echo "ERROR: expected 0xb7 (EM_AARCH64), got 0x${machine_byte} — image is wrong architecture"
            exit 1
          fi
          echo "Confirmed: image is linux/arm64"

      - name: Push image
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Summary
        run: |
          echo "### RKLLama image built (linux/arm64 verified)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source ref: \`${{ github.event.inputs.rkllama_ref || 'main' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
