name: Build RKLLama

# Builds rkllama from source on a native ARM64 runner and pushes to our
# GHCR namespace.  Triggered manually or when the upstream rkllama source
# commit we pin changes.
#
# Why we maintain our own image instead of using upstream:
#
#   1. The official ghcr.io/notpunchnox/rkllama:main image has a broken ARM64
#      build since 2026-04-07 (docker-container BuildKit driver contaminates
#      the layer cache with amd64 layers; see upstream PR #148).
#
#   2. Even a correctly built ARM64 image using the upstream Dockerfile
#      (FROM python:3.12-slim = Debian Trixie) fails on RK3588 with
#      "exec format error".  Root cause: Debian ARM64 packages are compiled
#      with Pointer Authentication (PAC, ARMv8.3-A).  RK3588 (Cortex-A76/A55)
#      is ARMv8.2-A and does NOT support PAC.  The Linux kernel returns ENOEXEC
#      when trying to execute PAC-guarded binaries on hardware without PAC.
#      Ubuntu 24.04 ARM64 packages are NOT compiled with PAC and work correctly
#      on RK3588.
#
# We therefore provide a custom Dockerfile using ubuntu:24.04 as base.
#
# Image: ghcr.io/schwankner/rkllama:<RKLLAMA_COMMIT>
#        ghcr.io/schwankner/rkllama:latest
on:
  workflow_dispatch:
    inputs:
      rkllama_ref:
        description: "rkllama git ref to build (branch, tag, or commit SHA)"
        required: false
        default: "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: schwankner/rkllama

jobs:
  build:
    name: Build rkllama (ARM64, Ubuntu base)
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout rkllama source
        uses: actions/checkout@v4
        with:
          repository: NotPunchnox/rkllama
          ref: ${{ github.event.inputs.rkllama_ref || 'main' }}
          fetch-depth: 1

      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log into GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Override the upstream Dockerfile with an Ubuntu 24.04 base.
      # The upstream uses python:3.12-slim (Debian Trixie) whose ARM64 binaries
      # require PAC (ARMv8.3-A Pointer Authentication).  RK3588 is ARMv8.2-A
      # and does not support PAC — the kernel returns ENOEXEC for those binaries.
      # Ubuntu 24.04 ARM64 does not compile packages with PAC and runs correctly.
      - name: Write Ubuntu-based Dockerfile
        run: |
          cat > Dockerfile.rk3588 << 'DOCKERFILE'
          FROM ubuntu:24.04

          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update \
              && apt-get install -y --no-install-recommends \
                 python3.12 python3.12-dev python3-pip python3.12-venv \
                 libgomp1 wget curl sudo git build-essential \
                 ffmpeg libsm6 libxext6 \
              && rm -rf /var/cache/apt/archives /var/lib/apt/lists/*

          # Use a virtual environment to avoid Ubuntu 24.04's PEP 668
          # "externally-managed-environment" restriction and the apt pip RECORD
          # file issue.  Inside a venv there is no EXTERNALLY-MANAGED marker
          # and pip can upgrade / install freely.
          RUN python3 -m venv /opt/venv
          ENV PATH="/opt/venv/bin:$PATH"

          RUN pip install --no-cache-dir --upgrade pip \
              && pip install --no-cache-dir "setuptools<82.0.0"

          WORKDIR /opt/rkllama

          COPY ./src/rkllama/lib/librkllmrt.so /usr/lib/
          RUN chmod 755 /usr/lib/librkllmrt.so && ldconfig

          COPY ./src/rkllama/lib/librknnrt.so /usr/lib/
          RUN chmod 755 /usr/lib/librknnrt.so && ldconfig

          COPY ./src /opt/rkllama/src
          RUN mkdir /opt/rkllama/models
          COPY README.md LICENSE pyproject.toml /opt/rkllama/

          RUN pip install --no-cache-dir .

          EXPOSE 8080

          CMD ["rkllama_server", "--models", "/opt/rkllama/models"]
          DOCKERFILE

      # --platform linux/arm64 forces Docker to pull the arm64 variant of
      # ubuntu:24.04 from the registry, bypassing any stale layers in the
      # runner's local layer cache.
      - name: Build image
        run: |
          docker build \
            --platform linux/arm64 \
            -f Dockerfile.rk3588 \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            .

      # Verify ELF machine type, NOT uname -m.
      # uname -m under QEMU/binfmt_misc returns the host arch, masking wrong-arch images.
      # Read ELF header byte 18 of /usr/bin/python3.12: 0xb7 = EM_AARCH64.
      - name: Verify ELF architecture is arm64
        run: |
          machine_byte=$(docker run --rm \
            --entrypoint /bin/sh \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            -c 'od -An -j18 -N1 -tx1 /usr/bin/python3.12 | tr -d " \n"')
          echo "ELF machine byte at offset 18: 0x${machine_byte}"
          if [ "$machine_byte" != "b7" ]; then
            echo "ERROR: expected 0xb7 (EM_AARCH64), got 0x${machine_byte} — image is wrong architecture"
            exit 1
          fi
          echo "Confirmed: image is linux/arm64"

      - name: Push image
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Summary
        run: |
          echo "### RKLLama image built (Ubuntu 24.04 base, linux/arm64 verified)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source ref: \`${{ github.event.inputs.rkllama_ref || 'main' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Base image: ubuntu:24.04 (no PAC, compatible with ARMv8.2-A RK3588)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
