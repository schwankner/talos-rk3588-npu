name: Build RKLLama

# Builds rkllama from source on a native ARM64 runner and pushes to our
# GHCR namespace.  Triggered manually or when the upstream rkllama source
# commit we pin changes.
#
# The official ghcr.io/notpunchnox/rkllama:main image has a broken ARM64
# build since 2026-04-07 (stale AMD64 buildcache layers, see upstream
# PR #148).  Until that is fixed and released we maintain our own image.
#
# Image: ghcr.io/schwankner/rkllama:<RKLLAMA_COMMIT>
#        ghcr.io/schwankner/rkllama:latest
on:
  workflow_dispatch:
    inputs:
      rkllama_ref:
        description: "rkllama git ref to build (branch, tag, or commit SHA)"
        required: false
        default: "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: schwankner/rkllama

jobs:
  build:
    name: Build rkllama (ARM64)
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout rkllama source
        uses: actions/checkout@v4
        with:
          repository: NotPunchnox/rkllama
          ref: ${{ github.event.inputs.rkllama_ref || 'main' }}
          fetch-depth: 1

      - name: Resolve commit SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # No 'platforms:' — the ubuntu-24.04-arm runner is natively ARM64.
      # Specifying 'platforms: linux/arm64' would force QEMU even on a
      # native ARM64 host and risks pulling stale cross-arch cache layers.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-arm64,mode=max

      - name: Summary
        run: |
          echo "### RKLLama image built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source ref: \`${{ github.event.inputs.rkllama_ref || 'main' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
