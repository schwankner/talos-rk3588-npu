name: Build Bench Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v11)'
        required: true
        default: 'v11'

jobs:
  build:
    name: Build rknn-bench ARM64
    # Native ARM64 runner — avoids QEMU layer-diff bug that zero-truncates
    # large binaries (python3.11) in pip-install layers built under emulation.
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: test/rknn-bench
          platforms: linux/arm64
          push: true
          # provenance=false: suppress OCI provenance attestation manifest.
          # With provenance enabled, buildx creates an OCI image index that
          # contains both the arm64 image and an "unknown/unknown" attestation
          # layer.  containerd on Talos/RK3588 can select the attestation
          # entry instead of the arm64 image, causing "exec format error".
          provenance: false
          tags: ghcr.io/schwankner/rk3588-rknn-bench:${{ inputs.tag }}
