name: Build Bench Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v10)'
        required: true
        default: 'v10'

jobs:
  build:
    name: Build rknn-bench ARM64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: test/rknn-bench
          platforms: linux/arm64
          push: true
          tags: ghcr.io/schwankner/rknn-bench:${{ inputs.tag }}
